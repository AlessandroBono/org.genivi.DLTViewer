app-id: org.genivi.DLTViewer
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: dlt-viewer
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=all
  - --share=network
  - --persist=.dlt
  - --env=LD_LIBRARY_PATH=/app/lib/aarch64-linux-gnu:/app/lib/x86_64-linux-gnu
cleanup:
  - /doc
  - /include
  - /sdk
  - /src
modules:
  - name: dlt-viewer
    buildsystem: cmake-ninja
    config-opts:
      - -DDLT_USE_QT_RPATH=ON
      - -DDLT_PARSER=OFF
      - -DDLT_APP_DIR_NAME=/
      - -DDLT_LIBRARY_INSTALLATION_PATH=${FLATPAK_DEST}/lib
      - -DDLT_EXECUTABLE_INSTALLATION_PATH=${FLATPAK_DEST}/bin
      - -DDLT_RESOURCE_INSTALLATION_PATH=${FLATPAK_DEST}/share
      - -DDLT_PLUGIN_INSTALLATION_PATH=${FLATPAK_DEST}/bin/plugins
    post-install:
      - install -Dm644 org.genivi.DLTViewer.metainfo.xml ${FLATPAK_DEST}/share/metainfo/org.genivi.DLTViewer.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/COVESA/dlt-viewer/archive/2.30.0.tar.gz
        sha256: e97de8c96662337d65aaaac852b69edcbe4b77f3c524f05088fa6b3fac31889c
        x-checker-data:
          type: json
          url: https://api.github.com/repos/COVESA/dlt-viewer/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/COVESA/dlt-viewer/archive/" + $version +
            ".tar.gz"'
      - type: file
        path: org.genivi.DLTViewer.metainfo.xml

